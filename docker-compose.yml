version: '3.9'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - shadowshell-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shadowshell-net

  celery:
    build: .
    command: celery -A shadowshell worker -l info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - shadowshell-net

volumes:
  redis-data:

networks:
  shadowshell-net:
    driver: bridge